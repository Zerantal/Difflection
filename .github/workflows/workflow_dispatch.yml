name: PR AppImage Test

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Head repository, e.g. owner/name"
        required: true
        type: string
      ref:
        description: "PR head SHA"
        required: true
        type: string

permissions:
  contents: read

jobs:
  appimage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.repo }}
          ref: ${{ inputs.ref }}
          fetch-depth: 1

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Publish Linux payload
        run: >
          dotnet publish Difflection.Desktop/Difflection.Desktop.csproj
          --configuration Release
          --runtime linux-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbol=false
          --output ./artifacts/linux-x64

      - name: Build AppImage
        run: |
          chmod +x scripts/build-appimage.sh
          PUBLISH_DIR=./artifacts/linux-x64 ./scripts/build-appimage.sh --skip-publish

      - name: Smoke test without FUSE
        run: |
          chmod +x ./artifacts/difflection-x86_64.AppImage
          ./artifacts/difflection-x86_64.AppImage --appimage-extract
          timeout 15s xvfb-run -a ./squashfs-root/AppRun
