name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - rid: linux-x64
            archive: difflection-linux-x64.tar.gz
          - rid: win-x64
            archive: difflection-win-x64.zip

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release --no-restore

      - name: Publish
        run: >
          dotnet publish Difflection.Desktop/Difflection.Desktop.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:DebugType=None
          -p:DebugSymbol=false
          --output ./artifacts/${{ matrix.rid }}

      - name: Archive Linux
        if: matrix.rid == 'linux-x64'
        run: tar -czf ./artifacts/${{ matrix.archive }} -C ./artifacts/${{ matrix.rid }} .

      - name: Install AppImage build dependencies
        if: matrix.rid == 'linux-x64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2t64

      - name: Build AppImage
        if: matrix.rid == 'linux-x64'
        run: |
          chmod +x scripts/build-appimage.sh
          PUBLISH_DIR=./artifacts/linux-x64 ./scripts/build-appimage.sh --skip-publish

      - name: Archive Windows
        if: matrix.rid == 'win-x64'
        run: cd ./artifacts/${{ matrix.rid }} && zip -r ../${{ matrix.archive }} .

      - name: Upload release asset
        uses: softprops/action-gh-release@v3
        with:
          prerelease: true
          generate_release_notes: true
          files: ./artifacts/${{ matrix.archive }}

      - name: Upload AppImage
        if: matrix.rid == 'linux-x64'
        uses: softprops/action-gh-release@v3
        with:
          files: ./artifacts/difflection-x86_64.AppImage
