<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-labelledby="title desc">
  <title id="title">Difflection icon - split image comparison</title>
  <desc id="desc">A compact split comparison icon with two contrasting panels and a central divider.</desc>

  <defs>
    <clipPath id="leftClip">
      <rect x="6" y="6" width="18" height="36" rx="4"/>
    </clipPath>
    <clipPath id="rightClip">
      <rect x="24" y="6" width="18" height="36" rx="4"/>
    </clipPath>
  </defs>

  <!-- Outer silhouette -->
  <rect x="3" y="3" width="42" height="42" rx="7" fill="#0B1116"/>
  <rect x="5" y="5" width="38" height="38" rx="5" fill="#111820"/>

  <!-- Left comparison panel -->
  <g clip-path="url(#leftClip)">
    <rect x="6" y="6" width="18" height="36" fill="#2E63C6"/>
    <rect x="6" y="25" width="18" height="17" fill="#17365C"/>
    <path d="M5.5 35.5 L13.2 27.5 L18.6 33.8 L24.8 28.8 L24.8 43 L5.5 43 Z" fill="#4C83E3"/>
    <circle cx="12.4" cy="12.5" r="3.2" fill="#F8FAFC"/>
  </g>

  <!-- Right comparison panel -->
  <g clip-path="url(#rightClip)">
    <rect x="24" y="6" width="18" height="36" fill="#228E65"/>
    <rect x="24" y="25" width="18" height="17" fill="#0F5F45"/>
    <path d="M23.2 35.5 L30.7 27.5 L35.8 33.8 L43.2 28.8 L43.2 43 L23.2 43 Z" fill="#5EC59A"/>
    <circle cx="35.8" cy="12.5" r="3.2" fill="#F6E36A"/>
  </g>

  <!-- Divider -->
  <path d="M24 5.5 V42.5" stroke="#F8FAFC" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M24 6.5 V41.5" stroke="#071014" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>

  <!-- Outer outline -->
  <rect x="3" y="3" width="42" height="42" rx="7" fill="none" stroke="#F8FAFC" stroke-width="2.4"/>
</svg>
